<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/head :: head(${pageTitle})}"></th:block>

<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>

<main class="container py-5">
    <section class="mb-4">
        <h1 class="fw-bold mb-1">Novo produto</h1>
        <p class="text-secondary mb-0">
            Vamos começar com um cadastro simples e depois evoluir com validação e modelagem mais rica.
        </p>
    </section>

    <section class="bg-white border rounded-4 shadow-sm p-4 p-md-5">
        <form th:action="@{/products}" th:object="${product}" method="post" class="row g-4">

            <div class="col-12" th:if="${#fields.hasAnyErrors()}">
                <div class="alert alert-danger" role="alert">
                    Corrija os erros do formulário antes de continuar.
                </div>
            </div>

            <div class="col-12">
                <label for="title" class="form-label">Título</label>
                <input
                        type="text"
                        id="title"
                        th:field="*{title}"
                        class="form-control"
                        th:classappend="${#fields.hasErrors('title')} ? ' is-invalid' : ''"
                        placeholder="Ex.: Kotlin para Web">
                <div class="invalid-feedback" th:errors="*{title}">
                    Erro no título
                </div>
            </div>

            <div class="col-md-6">
                <label for="author" class="form-label">Autor</label>
                <input
                        type="text"
                        id="author"
                        th:field="*{author}"
                        class="form-control"
                        th:classappend="${#fields.hasErrors('author')} ? ' is-invalid' : ''"
                        placeholder="Ex.: Paulo Menezes">
                <div class="invalid-feedback" th:errors="*{author}">
                    Erro no autor
                </div>
            </div>

            <div class="col-md-6">
                <label for="price" class="form-label">Preço</label>
                <input
                        type="number"
                        id="price"
                        th:field="*{price}"
                        class="form-control"
                        th:classappend="${#fields.hasErrors('price')} ? ' is-invalid' : ''"
                        step="0.01"
                        min="0"
                        placeholder="0.00">
                <div class="invalid-feedback" th:errors="*{price}">
                    Erro no preço
                </div>
            </div>

            <div class="col-12">
                <label for="description" class="form-label">Descrição</label>
                <textarea
                        id="description"
                        th:field="*{description}"
                        class="form-control"
                        th:classappend="${#fields.hasErrors('description')} ? ' is-invalid' : ''"
                        rows="5"
                        placeholder="Descreva o produto"></textarea>
                <div class="invalid-feedback" th:errors="*{description}">
                    Erro na descrição
                </div>
            </div>

            <div class="col-12 d-flex gap-3 flex-wrap">
                <button type="submit" class="btn btn-primary">
                    Salvar produto
                </button>
                <a th:href="@{/products}" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </section>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
