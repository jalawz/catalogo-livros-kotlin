<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/head :: head(${pageTitle})}"></th:block>

<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<th:block th:replace="~{fragments/messages :: messages}"></th:block>

<main class="container py-5">
    <section class="mb-4">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <h1 class="fw-bold mb-1">Produtos</h1>
                <p class="text-secondary mb-0">
                    Catálogo inicial carregado do banco H2.
                </p>
            </div>

            <a class="btn btn-primary" th:href="@{/products/form}">
                Novo produto
            </a>
        </div>
    </section>

    <section class="row g-4" th:if="${!#lists.isEmpty(products)}">
        <div class="col-md-6 col-lg-4" th:each="product : ${products}">
            <article class="card shadow-sm h-100 product-card">
                <div class="card-body d-flex flex-column">
                    <span class="badge text-bg-dark mb-3">Livro</span>
                    <h5 class="card-title" th:text="${product.title}">Título do produto</h5>
                    <p class="text-secondary mb-2">
                        por <span th:text="${product.author}">Autor</span>
                    </p>
                    <p class="card-text flex-grow-1" th:text="${product.description}">
                        Descrição do produto
                    </p>
                    <div class="mt-3 d-flex justify-content-between align-items-center">
                        <strong class="fs-5 text-primary"
                                th:text="'R$ ' + ${#numbers.formatDecimal(product.price, 1, 2, 'COMMA')}">
                            R$ 0,00
                        </strong>
                        <div>
                            <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-outline-dark btn-sm me-2">
                                Detalhes
                            </a>
                        </div>
                    </div>
                    <div class="mt-2 d-flex gap-2">
                        <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-outline-warning btn-sm flex-fill">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3helper_note: no node text 3.5l-2-2L13 2.5a.5.5 0 0 1 .436-.497L12.5 2a.5.5 0 0 1 .497.436z"/>
                            </svg> Editar
                        </a>
                        <a th:href="@{/products/{id}/delete(id=${product.id})}"
                           class="btn btn-outline-danger btn-sm flex-fill"
                           onclick="return confirm('Tem certeza que deseja excluir este produto?');">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
                                <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
                            </svg> Excluir
                        </a>
                    </div>
                </div>
            </article>
        </div>
    </section>

    <section th:if="${#lists.isEmpty(products)}" class="text-center py-5">
        <div class="bg-white border rounded-4 p-5 shadow-sm">
            <h2 class="h4 mb-3">Nenhum produto cadastrado</h2>
            <p class="text-secondary mb-0">
                Quando começarmos o formulário de cadastro, os produtos aparecerão aqui.
            </p>
        </div>
    </section>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
