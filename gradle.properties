# Gradle configuration
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m

# Gradle 8.14 generates deprecation warnings from Spring Boot plugin internals.
# These are not from our code — they stem from spring-boot-gradle-plugin using
# deprecated Gradle APIs (e.g., StartParameter.isConfigurationCacheRequested).
# The fix requires a Spring Boot plugin update (tracked issue in Spring projects).
# Setting warning.mode=none quiets them for now; remove once Spring Boot 3.6+ lands.
org.gradle.warning.mode=none
